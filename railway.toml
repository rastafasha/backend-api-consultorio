[build]
builder = "NIXPACKS"
buildCmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader"]

[deploy]
# Limpia, migra y arranca el proceso nativo del servidor web para mantener vivo el contenedor
startCommand = "php artisan config:clear && php artisan cache:clear && php artisan migrate --force && node /assets/index.js"
