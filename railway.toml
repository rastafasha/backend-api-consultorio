[build]
builder = "NIXPACKS"
# Fase 1: Instalación limpia de dependencias PHP
buildCmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader"]

[phases.predeploy]
# Fase 2: Ejecutar tareas de Laravel ANTES de iniciar el servidor web
cmds = [
    "php artisan config:clear",
    "php artisan cache:clear",
    "php artisan migrate --force"
]

# Dejamos que Railway controle el [deploy] de manera nativa sin sobreescribir el inicio
